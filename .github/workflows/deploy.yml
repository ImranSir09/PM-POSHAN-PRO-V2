name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Project Structure Debug
        run: |
          echo "Current Directory: $(pwd)"
          ls -R

      - name: Build
        run: |
          if [ -f package.json ]; then
            npm run build
          else
            echo "Error: package.json not found in root. Checking subdirectories..."
            find . -maxdepth 2 -name package.json
            exit 1
          fi
        env:
          VITE_SHEETDB_URL: ${{ secrets.VITE_SHEETDB_URL }}
          VITE_SHEETDB_API_KEY: ${{ secrets.VITE_SHEETDB_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
