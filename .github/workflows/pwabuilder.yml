name: Build APK via PWABuilder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Request build
        run: |
          curl -X POST https://pwabuilder.com/api/build \
          -H "Content-Type: application/json" \
          -d '{
            "url":"https://imransir09.github.io/PM-POSHAN-PRO-V2/",
            "platform":"android"
          }' > response.json

          cat response.json

      - name: Extract download url
        run: |
          URL=$(cat response.json | jq -r '.downloadUrl')
          echo "DOWNLOAD_URL=$URL" >> $GITHUB_ENV

      - name: Download APK
        run: |
          curl -L "$DOWNLOAD_URL" -o build.zip

      - name: unzip
        run: unzip build.zip -d output

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: pm-poshan-apk
          path: output/**/*.apk
