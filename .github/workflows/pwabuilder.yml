name: Build APK via PWABuilder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Request build
        run: |
          curl -X POST https://pwabuilder.com/api/build \
          -H "Content-Type: application/json" \
          -d '{
            "url":"https://imransir09.github.io/PM-POSHAN-PRO-V2/",
            "platforms":["android"]
          }' > response.json

          cat response.json

      - name: Get build id
        run: |
          ID=$(jq -r '.id' response.json)
          echo "BUILD_ID=$ID" >> $GITHUB_ENV

      - name: Wait and download
        run: |
          sleep 20
          curl -L "https://pwabuilder.com/api/build/$BUILD_ID/android" -o build.zip

      - name: unzip
        run: unzip build.zip -d output

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: pm-poshan-apk
          path: output/**/*.apk
