name: Build APK via PWABuilder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Request build
        run: |
          curl -L -X POST "https://pwabuilder.com/api/build" \
          -H "Content-Type: application/json" \
          -d '{
            "url":"https://imransir09.github.io/PM-POSHAN-PRO-V2/",
            "platform":"android",
            "packageId":"com.imran.poshan",
            "name":"PM Poshan Pro",
            "launcherName":"PM Poshan Pro"
          }' \
          -o build.zip

      - name: unzip
        run: unzip build.zip -d output

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: pm-poshan-apk
          path: output/**/*.apk
