name: Build APK

on:
push:
branches: [ main ]

jobs:
build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 18

  - run: npm install -g @bubblewrap/cli

  - name: Build APK
    run: |
      bubblewrap build \
        --manifest=https://imransir09.github.io/PM-POSHAN-PRO-V2/manifest.json \
        --skipPwaValidation \
        --nonInteractive

  - uses: actions/upload-artifact@v4
    with:
      name: pm-poshan-apk
      path: "*.apk"
