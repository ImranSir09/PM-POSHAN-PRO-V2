name: Build APK
on: workflow_dispatch
jobs:
build:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-node@v4
with:
node-version: 18
- uses: actions/setup-java@v4
with:
distribution: temurin
java-version: 17
- run: npm install -g @bubblewrap/cli
- run: bubblewrap init --manifest=https://imransir09.github.io/PM-POSHAN-PRO-V2/manifest.json --directory=twa --skipPwaValidation --nonInteractive
- run: cd twa && bubblewrap build --skipPwaValidation
- uses: actions/upload-artifact@v4
with:
name: pm-poshan-apk
path: twa/app/build/outputs/apk/release/*.apk
