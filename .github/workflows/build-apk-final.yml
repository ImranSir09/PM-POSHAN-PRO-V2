name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          bubblewrap init \
          --manifest=https://imransir09.github.io/PM-POSHAN-PRO-V2/manifest.json \
          --directory=twa \
          --packageId=com.pmposhan.pro \
          --host=imransir09.github.io \
          --name="PM Poshan Pro" \
          --launcherName="PM Poshan Pro" \
          --display=standalone \
          --orientation=portrait \
          --themeColor=#0ea5e9 \
          --backgroundColor=#f8fafc \
          --skipPwaValidation \
          --nonInteractive \
          --jdkPath=$JAVA_HOME

      - name: Build APK
        run: |
          cd twa
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pm-poshan-apk
          path: twa/app/build/outputs/apk/release/*.apk
